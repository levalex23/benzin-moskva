<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АЗС Москва — где есть бензин прямо сейчас</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect width="28" height="28" rx="8" fill="#E8341C"/>
        <path d="M8 22V10a2 2 0 012-2h6a2 2 0 012 2v2h1a2 2 0 012 2v6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <rect x="9" y="11" width="6" height="4" rx="1" fill="#fff" opacity=".5"/>
        <circle cx="19" cy="20" r="2" stroke="#fff" stroke-width="1.5"/>
      </svg>
      <span class="logo-text">БензинМосква</span>
    </div>
    <div class="header-stats" id="headerStats">
      <div class="stat-pill stat-ok" id="statOk">
        <span class="dot"></span><span id="countOk">—</span> норм
      </div>
      <div class="stat-pill stat-queue" id="statQueue">
        <span class="dot"></span><span id="countQueue">—</span> очередь
      </div>
      <div class="stat-pill stat-empty" id="statEmpty">
        <span class="dot"></span><span id="countEmpty">—</span> нет
      </div>
    </div>
    <div class="header-right">
      <span class="live-badge"><span class="live-dot"></span>Live</span>
      <button class="btn-add-station" id="btnAddStation" title="Добавить заправку">+ АЗС</button>
    </div>
  </div>
</header>

<!-- MAP -->
<div id="map"></div>

<!-- SIDE PANEL -->
<aside class="side-panel" id="sidePanel" aria-hidden="true">
  <div class="panel-drag" id="panelDrag"></div>
  <button class="panel-close" id="panelClose" aria-label="Закрыть">
    <svg width="18" height="18" viewBox="0 0 18 18"><path d="M2 2l14 14M16 2L2 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>

  <div class="panel-header">
    <div class="panel-brand" id="panelBrand"></div>
    <h2 class="panel-name" id="panelName"></h2>
    <div class="panel-addr" id="panelAddr"></div>
    <div class="panel-status-row">
      <span class="status-badge" id="panelStatusBadge"></span>
      <span class="panel-updated" id="panelUpdated"></span>
    </div>
  </div>

  <div class="panel-fuel-types" id="panelFuelTypes"></div>

  <div class="panel-section">
    <div class="section-label">Сообщить о статусе</div>
    <div class="report-buttons">
      <button class="report-btn" data-type="ok" onclick="submitReport('ok')">
        <span class="rb-icon rb-ok">✓</span>
        <span class="rb-text">Бензин есть<br><small>очереди нет</small></span>
      </button>
      <button class="report-btn" data-type="queue" onclick="submitReport('queue')">
        <span class="rb-icon rb-queue">⏱</span>
        <span class="rb-text">Очередь<br><small>15+ минут</small></span>
      </button>
      <button class="report-btn" data-type="limit" onclick="submitReport('limit')">
        <span class="rb-icon rb-limit">⚠</span>
        <span class="rb-text">Лимит<br><small>20–60 литров</small></span>
      </button>
      <button class="report-btn" data-type="empty" onclick="submitReport('empty')">
        <span class="rb-icon rb-empty">✕</span>
        <span class="rb-text">Нет бензина<br><small>или закрыто</small></span>
      </button>
    </div>
  </div>

  <div class="panel-section" id="reportsSection">
    <div class="section-label">Последние отчёты</div>
    <div id="reportsList" class="reports-list"></div>
  </div>
</aside>

<!-- FEED STRIP -->
<div class="feed-strip" id="feedStrip">
  <div class="feed-inner" id="feedInner"></div>
</div>

<!-- MODAL: ADD STATION -->
<div class="modal-overlay" id="modalAdd" aria-hidden="true">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()" aria-label="Закрыть">
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <h3 class="modal-title">Добавить заправку</h3>
    <p class="modal-sub">Нажми на карту, чтобы выбрать местоположение, затем заполни форму.</p>
    <div class="form-row">
      <label>Сеть АЗС</label>
      <select id="addBrand">
        <option value="Лукойл">Лукойл</option>
        <option value="Газпромнефть">Газпромнефть</option>
        <option value="Роснефть">Роснефть</option>
        <option value="Татнефть">Татнефть</option>
        <option value="ОРТК">ОРТК</option>
        <option value="Shell">Shell</option>
        <option value="BP">BP</option>
        <option value="Другая">Другая</option>
      </select>
    </div>
    <div class="form-row">
      <label>Адрес</label>
      <input type="text" id="addAddr" placeholder="Напр., Ленинградское ш., 5">
    </div>
    <div class="form-row">
      <label>Текущий статус</label>
      <div class="modal-status-btns">
        <button class="ms-btn active" data-type="ok" onclick="selectStatus(this,'ok')">Есть бензин</button>
        <button class="ms-btn" data-type="queue" onclick="selectStatus(this,'queue')">Очередь</button>
        <button class="ms-btn" data-type="empty" onclick="selectStatus(this,'empty')">Нет бензина</button>
      </div>
    </div>
    <div class="modal-coords" id="modalCoords">Координаты: не выбраны</div>
    <button class="btn-submit" id="btnSubmitStation" onclick="submitStation()">Добавить заправку →</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="js/data.js"></script>

</body>
